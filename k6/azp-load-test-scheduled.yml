# Esse arquivo tem como função o controle de que testes devem ser executados em determinado horário.
# Dependedo do horário, é considerado um conjunto de testes. 
# Publica-se os artefatos indicando quais devem ser os arquivos considerados, e executa a trigger para disparar a próxima pipeline, que irá recuperar os artefatos,
# e executar os testes de acordo com os arquivos indicados.

trigger: none

parameters:
  - name: TRIGGER_TEST
    displayName: Executar pipeline de teste após essa
    type: boolean
    default: true
  - name: OVERRIDE_FILE
    displayName: "Execução manual - File to Run (opcional)"
    type: string
    default: ' '

variables:
- name: K6_RUN_FILE_TEST  # Salvará aqui o nome dos arquivos que devem ser considerados para execução
  value: ""

schedules:

  - cron: '0 3 * * *' # Executa meia noite
    displayName: 'All - Midnight Build'
    branches:
      include:
        - master
    always: true
  - cron: '0 4 * * *'  # Executa carga 1 da manha
    displayName: 'Load Example'
    branches:
      include:
        - master
    always: true
  
  - cron: '0 5 * * *'  # Executa carga 2 da manha
    displayName: 'Load Another Example'
    branches:
      include:
        - master
    always: true


jobs:
  - job: PublishArtifacts
    displayName: "Publish Artifacts"  # publica os artefatos, para ser recuperado posteriormente
    steps:
      - checkout: none
        displayName: "Git - Checkout"

      - script: |
          echo "Configuração para publicação"
          echo "Build.Reason = $(Build.Reason)"
          echo "Build.DefinitionName = $(Build.DefinitionName)"

          if [[ "$(Build.Reason)" == "Schedule" ]]; then
            echo "Build.CronSchedule.DisplayName= $(Build.CronSchedule.DisplayName)"
            
            if [[ "$(Build.CronSchedule.DisplayName)" == "All - Midnight Build" ]]; then  # executo todos
              echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]./k6/index.js"
              
            elif [[ "$(Build.CronSchedule.DisplayName)" == "Load Example" ]]; then # carga
              echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]./k6/api/project/example/conjunto_example/example_test/example_test.js"

            elif [[ "$(Build.CronSchedule.DisplayName)" == "Load Another Example" ]]; then # carga
              echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]./k6/api/project/example/another_example/another_example_test/another_example_test.js"
            fi

          elif [[ "$(Build.Reason)" == "Manual" ]]; then
            
            OVERRIDE_FILE="${{ parameters.OVERRIDE_FILE }}"
            echo "OVERRIDE_FILE = $OVERRIDE_FILE"

            if [[ -n "${OVERRIDE_FILE// /}" ]]; then # se foi informado um arquivo para executação - remove espaços e verifica se sobrou algo
              echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]$OVERRIDE_FILE"
            else
              echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]./k6/index.js"
            fi

          fi
        displayName: "Define aquivo de teste para o K6_RUN_FILE_TEST, conforme o horário"

      - task: CmdLine@2
        displayName: "Debug variables"
        inputs:
          script: |
            echo "Execuçao: $(Build.CronSchedule.DisplayName)"
            echo K6_RUN_FILE_TEST: $(K6_RUN_FILE_TEST)
      - task: CmdLine@2
        displayName: "Set variables"
        inputs:
          script: |
            echo "##vso[task.setvariable variable=K6_RUN_FILE_TEST;]$(K6_RUN_FILE_TEST)" >> $(Pipeline.Workspace)/pipeline.env
            echo "Variáveis adicionadas no arquivo pipeline.env"
            echo K6_RUN_FILE_TEST: $(K6_RUN_FILE_TEST)

      - task: PublishPipelineArtifact@1 # publica os artefatos
        inputs:
          targetPath: '$(Pipeline.Workspace)'
          artifact: 'K6Files'
          publishLocation: 'pipeline'
  
  - job: TriggerPipelines 
    displayName: "[app-delivery-test] TriggerPipelines"   # Trigger para disparar a pipeline de teste
    dependsOn: PublishArtifacts
    steps:
      - checkout: none
        displayName: "Git - Checkout"

      - task: PowerShell@2
        displayName: "PowerShell - AddBuildTag - Trigger Test"
        condition: eq('${{ parameters.TRIGGER_TEST }}', true)
        inputs:
          targetType: 'inline'
          script: |
            echo "##vso[build.addbuildtag]trigger-app-delivery-test"